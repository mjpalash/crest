---
layout: default
---

{% assign lang = page.lang | default: site.lang | default: "en" %}
{% assign strings = site.data.strings[lang] %}

<section class="hero">
  <div class="container text-center">
    <h1 class="hero-title">COMPUTE Regional Event</h1>
    <p class="hero-date">{{ strings.home.date_display }}</p>
    <p class="hero-location">{{ site.data.config.site.location.name }}</p>
    <a href="{{ '/register/' | relative_url }}" class="btn btn-primary btn-lg">
      {{ strings.home.register_cta }}
    </a>
  </div>
</section>

{{ content }}
