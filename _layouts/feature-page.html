---
layout: default
---
{% if page.feature and site.features[page.feature] == false %}
<div class="container py-5">
  <div class="row">
    <div class="col-lg-8 mx-auto text-center">
      <h1 class="mb-4">Page Not Available</h1>
      <p class="lead text-muted mb-4">This page is not currently available.</p>
      <a href="{{ '/' | relative_url }}" class="btn btn-primary">Go to Homepage</a>
    </div>
  </div>
</div>
{% else %}
{{ content }}
{% endif %}
